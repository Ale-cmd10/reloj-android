name: Compilar APK

# Se ejecuta al hacer push y también manualmente desde la pestaña "Actions"
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Buildozer (Android debug)
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev build-essential \
            ccache libltdl-dev

      - name: Instalar Buildozer y Cython
        run: |
          python -m pip install --upgrade pip
          # La versión de python-for-android se fija en buildozer.spec
          # (p4a.branch = v2024.01.21) porque Buildozer la clona desde git.
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cachear el SDK/NDK de Android
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-v3-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v3-${{ runner.os }}-

      - name: Compilar el APK (debug)
        run: |
          # El Android Gradle Plugin exige Java 17 (el runner usa Java 11 por
          # defecto). Apuntamos JAVA_HOME al JDK 17 ya instalado en el runner.
          export JAVA_HOME="$JAVA_HOME_17_X64"
          echo "Usando JAVA_HOME=$JAVA_HOME"
          java -version
          export GRADLE_OPTS="-Xmx4g"
          yes | buildozer android debug

      - name: Subir el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reloj-apk
          path: bin/*.apk
          if-no-files-found: error
